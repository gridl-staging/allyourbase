name: Build Postgres Binaries

on:
  workflow_dispatch:
    inputs:
      pg_version:
        description: "Postgres major version to build"
        required: false
        default: "16"
  push:
    tags:
      - "pg-[0-9]*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-amd64
            goos: linux
            goarch: amd64
          - os: ubuntu-latest
            platform: linux-arm64
            goos: linux
            goarch: arm64
          - os: macos-latest
            platform: darwin-amd64
            goos: darwin
            goarch: amd64
          - os: macos-latest
            platform: darwin-arm64
            goos: darwin
            goarch: arm64

    runs-on: ${{ matrix.os }}
    name: Build (${{ matrix.platform }})

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set PG version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            # Extract version from tag like "pg-16" → "16"
            echo "pg_version=${GITHUB_REF_NAME#pg-}" >> "$GITHUB_OUTPUT"
          else
            echo "pg_version=${{ github.event.inputs.pg_version || '16' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            gcc make curl xz-utils \
            libssl-dev libxml2-dev uuid-dev \
            libreadline-dev zlib1g-dev

      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install openssl libxml2 readline xz

      - name: Build Postgres binaries
        run: |
          bash scripts/build-postgres.sh \
            --pg-version "${{ steps.version.outputs.pg_version }}" \
            --os "${{ matrix.goos }}" \
            --arch "${{ matrix.goarch }}" \
            --output-dir dist/pg-binaries

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ayb-postgres-${{ steps.version.outputs.pg_version }}-${{ matrix.platform }}
          path: |
            dist/pg-binaries/ayb-postgres-*.tar.xz
            dist/pg-binaries/SHA256SUMS
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/pg-')
    name: Create GitHub Release

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/pg-binaries

      - name: Set PG version from tag
        id: version
        run: echo "pg_version=${GITHUB_REF_NAME#pg-}" >> "$GITHUB_OUTPUT"

      - name: Merge SHA256SUMS
        run: |
          cd dist/pg-binaries
          find . -type f -name SHA256SUMS -print0 | xargs -0 cat | sort -u > SHA256SUMS_merged
          mv SHA256SUMS_merged SHA256SUMS

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: "Postgres ${{ steps.version.outputs.pg_version }} Binaries"
          body: |
            AYB-managed Postgres ${{ steps.version.outputs.pg_version }} binaries with pgvector, pg_trgm, and pg_cron.

            **Platforms:** linux-amd64, linux-arm64, darwin-amd64, darwin-arm64
          files: |
            dist/pg-binaries/**/ayb-postgres-*.tar.xz
            dist/pg-binaries/SHA256SUMS
