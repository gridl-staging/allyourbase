<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
  <h2>Your verification code</h2>
  <p>Use this code to complete sign-in to your {{.AppName}} account:</p>
  <p style="font-size: 32px; font-weight: bold; letter-spacing: 8px; text-align: center; padding: 16px; background: #f3f4f6; border-radius: 8px;">{{.Code}}</p>
  <p>This code expires in 10 minutes.</p>
  <p style="font-size: 13px; color: #6b7280;">If you didn't request this code, someone may be trying to access your account. Change your password immediately.</p>
</body>
</html>
